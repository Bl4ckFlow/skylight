version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: skylight_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: skylight
      POSTGRES_PASSWORD: skylight_dev
      POSTGRES_DB: skylight
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U skylight -d skylight']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
